meters:
- name: cloud_seats
  description: Active Twenty Cloud users billed per seat per month (Pro or Organization plan).
  unit: seats
  aggregation: sum
  dimensions:
  - workspace
  - plan
- name: workflow_credits
  description: Workflow automation credits consumed on Twenty Cloud plans.
  unit: credits
  aggregation: sum
  dimensions:
  - workspace
- name: self_hosted_infrastructure
  description: Compute, database, and storage cost of running the open-source core on your own infrastructure.
  unit: hours
  aggregation: sum
  dimensions:
  - environment
principles:
- name: Visibility
  description: Track active seat counts per workspace on Cloud; track infrastructure utilization on self-hosted.
- name: Allocation
  description: Map workspaces and seats to teams/cost centers; tag self-hosted infrastructure per environment.
- name: Optimization
  description: Self-host the open-source core to avoid per-seat fees when ops capacity exists; right-size cloud seats and reclaim inactive ones.
- name: Accountability
  description: Review seat counts and plan tier monthly; assign owners for workspaces and self-hosted environments.
