description: >-
  FinOps view of Twenty spend. Twenty is open-source and free to self-host, so
  the open-source core has no per-seat license cost and spend is limited to your
  own infrastructure (compute, database, storage). Twenty Cloud is billed per
  user per month on a Pro ($9) or Organization ($19) plan, making seat count the
  primary cost driver for the managed offering.
notes: >-
  Cloud per-seat rates may change; verify against the Twenty pricing page during
  reconciliation. Self-hosted cost is infrastructure-only.
sources:
- https://twenty.com/pricing
- https://docs.twenty.com/
